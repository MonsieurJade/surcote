<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surcôté</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── MENU PRINCIPAL ── */
    body.menu-page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      transition: background-color 0.4s ease;
    }

    .menu-logo {
      font-family: 'Black Han Sans', 'Anton', Impact, sans-serif;
      font-size: clamp(3.2rem, 14vw, 7rem);
      font-weight: 900;
      color: #111;
      letter-spacing: -0.03em;
      white-space: nowrap;
      line-height: 1;
      border: 4px solid #111;
      padding: 0.15em 0.4em;
      background: white;
      display: inline-block;
      text-transform: uppercase;
      margin-bottom: 0.6em;
      box-shadow: 6px 6px 0 #111;
    }

    .menu-tagline {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.75rem, 3vw, 1rem);
      font-weight: 700;
      color: #111;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: white;
      border: 3px solid #111;
      padding: 0.3em 0.8em;
      margin-bottom: 3rem;
      box-shadow: 4px 4px 0 #111;
    }

    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 340px;
    }

    .btn-menu {
      display: block;
      text-align: center;
      text-decoration: none;
      font-family: 'Black Han Sans', 'Anton', Impact, sans-serif;
      font-size: clamp(1.5rem, 6vw, 2rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #111;
      background: white;
      border: 4px solid #111;
      padding: 0.6em 1em;
      box-shadow: 6px 6px 0 #111;
      transition: transform 0.1s, box-shadow 0.1s;
      cursor: pointer;
    }

    .btn-menu:hover,
    .btn-menu:focus {
      transform: translate(-3px, -3px);
      box-shadow: 9px 9px 0 #111;
    }

    .btn-menu:active {
      transform: translate(3px, 3px);
      box-shadow: 3px 3px 0 #111;
    }

    .btn-menu.btn-jouer {
      font-size: clamp(1.8rem, 8vw, 2.6rem);
    }

    .menu-footer {
      margin-top: 3rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: #111;
      opacity: 0.6;
      text-align: center;
      letter-spacing: 0.05em;
    }

    /* shuffle button */
    .btn-shuffle {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #111;
      text-decoration: underline;
      padding: 0;
      margin-top: 1.5rem;
      opacity: 0.7;
    }
    .btn-shuffle:hover { opacity: 1; }
  </style>
</head>
<body class="menu-page">

  <div class="menu-logo">SURCÔTÉ</div>
  <div class="menu-tagline">Surcôté ou sous-côté ?</div>

  <nav class="menu-buttons">
    <a href="game.html" class="btn-menu btn-jouer">▶ Jouer</a>
    <a href="proposer.html" class="btn-menu">✚ Proposer</a>
    <a href="infos.html" class="btn-menu">ℹ Infos</a>
  </nav>

  <button class="btn-shuffle" onclick="randomColor()">🎲 Autre couleur</button>

  <div class="menu-footer">919 cartes · 18 catégories</div>

  <script>
    // Couleurs des thèmes (même palette que les catégories)
    const THEME_COLORS = [
      '#FF3B30', // Rouge vif – Mode
      '#FF9500', // Orange – Food
      '#FFCC00', // Jaune – Voyage
      '#34C759', // Vert – Nature
      '#00C7BE', // Turquoise – Bien-être
      '#007AFF', // Bleu – Tech
      '#5856D6', // Violet – Musique
      '#FF2D55', // Rose – Beauté
      '#AF52DE', // Mauve – Cinéma
      '#FF6B35', // Orange foncé – Sport
      '#30D158', // Vert clair – Animaux
      '#64D2FF', // Bleu ciel – Déco
      '#FFD60A', // Jaune vif – Soirées
      '#FF453A', // Rouge sombre – Nostalgie
      '#32ADE6', // Bleu – Quotidien
      '#FF375F', // Rose fuchsia – Créativité
      '#6C6C70', // Gris – Actions
    ];

    function randomColor() {
      const color = THEME_COLORS[Math.floor(Math.random() * THEME_COLORS.length)];
      document.body.style.backgroundColor = color;
      localStorage.setItem('surcote_menu_color', color);
    }

    // Au chargement : couleur mémorisée ou aléatoire
    const saved = localStorage.getItem('surcote_menu_color');
    if (saved) {
      document.body.style.backgroundColor = saved;
    } else {
      randomColor();
    }

    // Nouveau swipe à chaque visite (couleur fraîche)
    window.addEventListener('pageshow', () => randomColor());
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Surcôté</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --sur: #D85A30;
      --sous: #3B8C4E;
      --sur-bg: rgba(216,90,48,0.18);
      --sous-bg: rgba(59,140,78,0.18);
      --bg: #0e0e0e;
      --cat-bg: #0e0e0e;
      --surface: rgba(0,0,0,0.35);
      --border: rgba(255,255,255,0.08);
      --text: #f5f5f0;
      --muted: rgba(245,245,240,0.45);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--cat-bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      transition: background 0.6s ease;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      background: var(--cat-bg);
      transition: background 0.6s ease;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.25rem 0.6rem;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #111;
    }
    .logo span { color: #111; }
    .votes-badge {
      font-size: 12px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--sous); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* CATEGORIES */
    .cats {
      display: flex;
      gap: 6px;
      padding: 0.6rem 1.25rem 0.75rem;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .cats::-webkit-scrollbar { display: none; }
    .pill {
      white-space: nowrap;
      padding: 5px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(0,0,0,0.12);
      color: #666;
      background: transparent;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .pill.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    /* SWIPE ZONE */
    .swipe-area {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .axis-label {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 20;
    }
    .axis-label.top { top: 8px; color: var(--sur); opacity: 0.4; }
    .axis-label.bottom { bottom: 8px; color: var(--sous); opacity: 0.4; }
    .axis-label .chevron { font-size: 14px; }

    .pulling-up .axis-label.top { opacity: 1; transform: translateX(-50%) scale(1.1); }
    .pulling-down .axis-label.bottom { opacity: 1; transform: translateX(-50%) scale(1.1); }

    .card-zone {
      position: relative;
      width: calc(100% - 2rem);
      height: 100%;
      max-height: 500px;
    }

    /* CARDS */
    .card {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      overflow: hidden;
      cursor: grab;
      user-select: none;
      touch-action: none;
      will-change: transform;
    }
    .card:active { cursor: grabbing; }
    .card.back {
      transform: scale(0.94) translateY(16px);
      opacity: 0.5;
      z-index: 0;
      pointer-events: none;
    }
    .card.front { z-index: 1; }

    .card-photo {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    .card-photo img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      transition: transform 0.4s ease;
    }
    .card.front:active .card-photo img { transform: scale(1.02); }
    .card-photo-fallback {
      width: 100%; height: 100%;
      background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
    }

    .card-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.85) 0%,
        rgba(0,0,0,0.3) 45%,
        rgba(0,0,0,0.05) 100%
      );
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
      z-index: 5;
    }
    .overlay-sur { background: rgba(216,90,48,0.5); }
    .overlay-sous { background: rgba(59,140,78,0.5); }
    .overlay-label {
      font-family: 'Syne', sans-serif;
      font-size: 30px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
    }
    .overlay-arrow { font-size: 22px; color: rgba(255,255,255,0.8); }

    .show-sur .overlay-sur { opacity: 1; }
    .show-sous .overlay-sous { opacity: 1; }

    .card-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 1.5rem 1.5rem 1.75rem;
      z-index: 3;
    }
    .card-cat {
      font-size: 10px;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .card-name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 7vw, 38px);
      font-weight: 800;
      color: #fff;
      line-height: 1.05;
      letter-spacing: -1px;
    }

    /* LOADING / EMPTY */
    .card-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border-radius: 24px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--sur);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* RESULT PANEL */
    .result-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 1.5rem 1.5rem 2rem;
      border-top: 1px solid var(--border);
      display: none;
      flex-direction: column;
      gap: 14px;
      z-index: 30;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(.25,.8,.25,1);
    }
    .result-panel.visible {
      display: flex;
      transform: translateY(0);
    }

    .result-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 999px;
      margin: 0 auto -4px;
    }
    .result-subject {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .result-name {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .result-verdict {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }
    .verdict-pct {
      font-size: 36px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
    }
    .verdict-pct.sur { color: var(--sur); }
    .verdict-pct.sous { color: var(--sous); }

    .bar-wrap {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      overflow: hidden;
    }
    .bar-fill {
      height: 6px;
      border-radius: 999px;
      background: var(--sur);
      width: 0%;
      transition: width 1s cubic-bezier(.25,.8,.25,1);
    }
    .bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
    }
    .bar-labels span:first-child { color: var(--sous); font-weight: 500; }
    .bar-labels span:last-child { color: var(--sur); font-weight: 500; }

    .btn-next {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: var(--sur);
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-next:active { opacity: 0.85; transform: scale(0.98); }

    /* NO MORE CARDS */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 100%;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 2rem;
    }
    .empty-state .big { font-family: 'Syne', sans-serif; font-size: 48px; }
    .empty-state.visible { display: flex; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Sur<span>côté</span></div>
    <div class="votes-badge">
      <div class="dot"></div>
      <span id="totalVotes">...</span> votes
    </div>
  </div>

  <div class="cats" id="cats">
    <div class="pill active" data-cat="Tout">Tout</div>
    <div class="pill" data-cat="Mode">Mode</div>
    <div class="pill" data-cat="Musique">Musique</div>
    <div class="pill" data-cat="Food">Food</div>
    <div class="pill" data-cat="Tech">Tech</div>
    <div class="pill" data-cat="Voyage">Voyage</div>
    <div class="pill" data-cat="Vie quotidienne">Quotidien</div>
  </div>

  <div class="swipe-area" id="swipeArea">
    <div class="axis-label top">
      <span class="chevron">↑</span>
      Surcôté
    </div>

    <div class="card-zone" id="cardZone">
      <div class="card back" id="cardBack">
        <div class="card-photo" id="backPhoto"></div>
        <div class="card-gradient"></div>
        <div class="card-info">
          <div class="card-cat" id="backCat"></div>
          <div class="card-name" id="backName"></div>
        </div>
      </div>
      <div class="card front" id="cardFront">
        <div class="card-loading" id="cardLoading"><div class="spinner"></div></div>
        <div class="card-photo" id="frontPhoto"></div>
        <div class="card-gradient"></div>
        <div class="card-overlay overlay-sur">
          <div class="overlay-arrow">↑</div>
          <div class="overlay-label">Surcôté</div>
        </div>
        <div class="card-overlay overlay-sous">
          <div class="overlay-label">Sous-côté</div>
          <div class="overlay-arrow">↓</div>
        </div>
        <div class="card-info">
          <div class="card-cat" id="frontCat"></div>
          <div class="card-name" id="frontName"></div>
        </div>
      </div>

      <div class="empty-state" id="emptyState">
        <div class="big">🎉</div>
        <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--text)">C'est tout pour l'instant !</div>
        <div>Reviens plus tard pour de nouvelles cartes.</div>
      </div>
    </div>

    <div class="axis-label bottom">
      Sous-côté
      <span class="chevron">↓</span>
    </div>
  </div>

  <div class="result-panel" id="resultPanel">
    <div class="result-handle"></div>
    <div>
      <div class="result-subject">Le verdict mondial sur</div>
      <div class="result-name" id="rName"></div>
    </div>
    <div style="display:flex;align-items:baseline;gap:10px">
      <div class="verdict-pct" id="rPct"></div>
      <div class="result-verdict" id="rVerdict"></div>
    </div>
    <div>
      <div class="bar-wrap"><div class="bar-fill" id="rBar"></div></div>
      <div class="bar-labels">
        <span id="rSous"></span>
        <span id="rSur"></span>
      </div>
    </div>
    <button class="btn-next" id="btnNext">Carte suivante →</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://rgtwretpvwtkviqjxcfc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJndHdyZXRwdnd0a3ZpcWp4Y2ZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODE0OTgsImV4cCI6MjA4OTA1NzQ5OH0.4LUYXGMhQQ39Ie8ixtz5nP6vPCnyWaaEjoPgLyvH5TY';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let items = [], idx = 0, currentCat = 'Tout';
let dragging = false, startY = 0, curY = 0;

const front = document.getElementById('cardFront');
const area = document.getElementById('swipeArea');
const panel = document.getElementById('resultPanel');
const loading = document.getElementById('cardLoading');

async function loadItems(cat) {
  let q = db.from('items').select('*');
  if (cat !== 'Tout') q = q.eq('category', cat);
  const { data } = await q.order('created_at', { ascending: false });
  return data || [];
}

async function loadTotalVotes() {
  const { count } = await db.from('votes').select('*', { count: 'exact', head: true });
  document.getElementById('totalVotes').textContent = (count || 0).toLocaleString('fr-FR');
}

async function getVotesForItem(itemId) {
  const { data } = await db.from('votes').select('vote').eq('item_id', itemId);
  if (!data || data.length === 0) return { sur: 50, sous: 50, total: 0 };
  const total = data.length;
  const surCount = data.filter(v => v.vote === 'sur').length;
  return {
    sur: Math.round((surCount / total) * 100),
    sous: Math.round(((total - surCount) / total) * 100),
    total
  };
}

async function castVote(itemId, vote) {
  await db.from('votes').insert({ item_id: itemId, vote });
  loadTotalVotes();
}

const CAT_COLORS = {
  'Mode':           '#8B1A6B',  // rose fuchsia profond
  'Food':           '#B85C00',  // orange brûlé
  'Voyage':         '#006B8F',  // bleu lagon
  'Tech':           '#1A1A6E',  // bleu électrique nuit
  'Vie quotidienne':'#2D6A4F',  // vert sauge
  'Musique':        '#5C0A7A',  // violet électrique
  'Cinéma':         '#7A0A0A',  // rouge cinéma
  'Sport':          '#0A4F7A',  // bleu sport
  'Beauté':         '#7A3A5C',  // mauve rosé
  'Tout':           '#0e0e0e',
};

function setCatBackground(category) {
  const color = CAT_COLORS[category] || '#0e0e0e';
  document.documentElement.style.setProperty('--cat-bg', color);
  document.body.style.background = color;
  document.querySelector('.app').style.background = color;
}

function hdUrl(url) {
  if (!url) return url;
  // Pexels: upgrade to higher resolution
  return url.replace(/\?w=\d+/, '?w=800&q=90');
}

function setCard(card, photoEl, nameEl, catEl) {
  if (!card) return;
  photoEl.innerHTML = '';
  const url = hdUrl(card.image_url);
  if (url) {
    const img = document.createElement('img');
    img.src = url;
    img.alt = card.name;
    img.onerror = () => {
      photoEl.innerHTML = '<div class="card-photo-fallback"></div>';
    };
    photoEl.appendChild(img);
  } else {
    photoEl.innerHTML = '<div class="card-photo-fallback"></div>';
  }
  nameEl.textContent = card.name;
  catEl.textContent = card.category;
}

function loadCards() {
  const c = items[idx];
  const n = items[idx + 1];
  if (!c) {
    front.style.display = 'none';
    document.getElementById('cardBack').style.display = 'none';
    document.getElementById('emptyState').classList.add('visible');
    return;
  }
  loading.style.display = 'none';
  setCatBackground(c.category);
  setCard(c, document.getElementById('frontPhoto'), document.getElementById('frontName'), document.getElementById('frontCat'));
  if (n) setCard(n, document.getElementById('backPhoto'), document.getElementById('backName'), document.getElementById('backCat'));
}

async function showResult(vote) {
  const c = items[idx];
  await castVote(c.id, vote);
  const stats = await getVotesForItem(c.id);
  document.getElementById('rName').textContent = c.name;
  const isSur = stats.sur >= 50;
  const pct = isSur ? stats.sur : stats.sous;
  const rPct = document.getElementById('rPct');
  rPct.textContent = pct + '%';
  rPct.className = 'verdict-pct ' + (isSur ? 'sur' : 'sous');
  document.getElementById('rVerdict').textContent = `des gens pensent que c'est ${isSur ? 'surcôté' : 'sous-côté'} (${stats.total} vote${stats.total > 1 ? 's' : ''})`;
  document.getElementById('rSous').textContent = stats.sous + '% sous-côté';
  document.getElementById('rSur').textContent = stats.sur + '% surcôté';
  panel.style.display = 'flex';
  requestAnimationFrame(() => {
    panel.classList.add('visible');
    setTimeout(() => { document.getElementById('rBar').style.width = stats.sur + '%'; }, 100);
  });
}

function swipe(dir) {
  const vote = dir < 0 ? 'sous' : 'sur';
  front.style.transition = 'transform 0.4s cubic-bezier(.25,.8,.25,1), opacity 0.4s';
  front.style.transform = `translateY(${dir * -600}px) rotate(${dir * -4}deg)`;
  front.style.opacity = '0';
  front.classList.remove('show-sur', 'show-sous');
  area.classList.remove('pulling-up', 'pulling-down');
  front.style.pointerEvents = 'none';
  showResult(vote);
}

document.getElementById('btnNext').onclick = () => {
  idx++;
  panel.classList.remove('visible');
  setTimeout(() => { panel.style.display = 'none'; }, 350);
  document.getElementById('rBar').style.width = '0%';
  front.style.transition = 'none';
  front.style.transform = '';
  front.style.opacity = '1';
  front.style.pointerEvents = '';
  loadCards();
};

function onStart(y) { dragging = true; startY = y; front.style.transition = 'none'; }
function onMove(y) {
  if (!dragging) return;
  curY = y - startY;
  front.style.transform = `translateY(${curY}px) rotate(${curY * 0.015}deg)`;
  front.classList.toggle('show-sur', curY < -70);
  front.classList.toggle('show-sous', curY > 70);
  area.classList.toggle('pulling-up', curY < -70);
  area.classList.toggle('pulling-down', curY > 70);
}
function onEnd() {
  if (!dragging) return; dragging = false;
  if (curY < -110) swipe(1);
  else if (curY > 110) swipe(-1);
  else {
    front.style.transition = 'transform 0.3s cubic-bezier(.25,.8,.25,1)';
    front.style.transform = '';
    front.classList.remove('show-sur', 'show-sous');
    area.classList.remove('pulling-up', 'pulling-down');
  }
  curY = 0;
}

front.addEventListener('mousedown', e => onStart(e.clientY));
window.addEventListener('mousemove', e => { if (dragging) onMove(e.clientY); });
window.addEventListener('mouseup', onEnd);
front.addEventListener('touchstart', e => { e.preventDefault(); onStart(e.touches[0].clientY); }, { passive: false });
front.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0].clientY); }, { passive: false });
front.addEventListener('touchend', onEnd);

document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', async () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    currentCat = p.dataset.cat;
    idx = 0;
    panel.classList.remove('visible');
    panel.style.display = 'none';
    loading.style.display = 'flex';
    front.style.cssText = '';
    document.getElementById('emptyState').classList.remove('visible');
    front.style.display = '';
    document.getElementById('cardBack').style.display = '';
    setCatBackground(currentCat);
    items = await loadItems(currentCat);
    loadCards();
  });
});

(async () => {
  loadTotalVotes();
  items = await loadItems('Tout');
  loadCards();
})();
</script>
</body>
</html>

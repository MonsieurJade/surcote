<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Surcôté</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --sur: #D85A30;
      --sous: #3B8C4E;
      --cat-bg: #e8e0d5;
      --cat-text: #111;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      background: var(--cat-bg);
      transition: background 0.5s ease;
    }

    /* HEADER — couleur du thème */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem 0.5rem;
      flex-shrink: 0;
      position: relative;
      z-index: 20;
      background: var(--cat-bg);
      transition: background 0.5s ease;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #111;
    }
    .votes-badge {
      font-size: 12px;
      color: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #111;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* CATEGORIES — couleur du thème */
    .cats {
      display: flex;
      gap: 6px;
      padding: 0 1.25rem 0.75rem;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
      background: var(--cat-bg);
      transition: background 0.5s ease;
    }
    .cats::-webkit-scrollbar { display: none; }
    .pill {
      white-space: nowrap;
      padding: 5px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid rgba(0,0,0,0.2);
      color: rgba(0,0,0,0.55);
      background: transparent;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .pill.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    /* CARD — plein écran */
    .card-zone {
      flex: 1;
      position: relative;
      min-height: 0;
    }

    .card {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      cursor: grab;
      user-select: none;
      touch-action: none;
      will-change: transform;
      overflow: hidden;
    }
    .card:active { cursor: grabbing; }

    .card.back {
      transform: scale(0.97) translateY(10px);
      opacity: 0.5;
      z-index: 0;
      pointer-events: none;
    }
    .card.front { z-index: 1; }

    /* PHOTO — haut de la carte */
    .card-photo {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }
    .card-photo img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    .card-photo-fallback {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, rgba(0,0,0,0.15), rgba(0,0,0,0.05));
    }

    /* HINT overlays */
    .hint-over {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
      z-index: 5;
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .hint-sur { background: rgba(216,90,48,0.45); }
    .hint-sous { background: rgba(59,140,78,0.45); }
    .show-sur .hint-sur { opacity: 1; }
    .show-sous .hint-sous { opacity: 1; }

    /* BLOC TEXTE BAS — couleur thème */
    .card-info {
      background: var(--cat-bg);
      transition: background 0.5s ease;
      padding: 1rem 1.25rem 1.25rem;
      flex-shrink: 0;
    }
    .card-cat {
      font-size: 10px;
      font-weight: 500;
      color: rgba(0,0,0,0.4);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .card-name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(26px, 7vw, 34px);
      font-weight: 800;
      color: #111;
      line-height: 1.05;
      letter-spacing: -1px;
    }

    /* AXIS LABELS — top flottant sur la photo */
    .axis-label.top {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 10;
      color: rgba(255,255,255,0.6);
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    .card-zone.pulling-up .axis-label.top { color: #fff; }

    /* LABEL BAS — sur la photo juste au-dessus du bloc couleur */
    .photo-bottom-label {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 10;
      color: rgba(255,255,255,0.6);
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
      white-space: nowrap;
    }
    .card-zone.pulling-down .photo-bottom-label { color: #fff; }

    /* LOADING */
    .card-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cat-bg);
      z-index: 10;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(0,0,0,0.1);
      border-top-color: #111;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* RESULT PANEL */
    .result-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-radius: 24px 24px 0 0;
      padding: 1.25rem 1.5rem 2.5rem;
      display: none;
      flex-direction: column;
      gap: 12px;
      z-index: 30;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(.25,.8,.25,1);
    }
    .result-panel.visible {
      display: flex;
      transform: translateY(0);
    }
    .result-handle {
      width: 36px; height: 4px;
      background: rgba(0,0,0,0.08);
      border-radius: 999px;
      margin: 0 auto 4px;
    }
    .result-subject {
      font-size: 10px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .result-name {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #111;
    }
    .verdict-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .verdict-pct {
      font-size: 40px;
      font-weight: 800;
      font-family: 'Syne', sans-serif;
      line-height: 1;
    }
    .verdict-pct.sur { color: var(--sur); }
    .verdict-pct.sous { color: var(--sous); }
    .result-verdict {
      font-size: 13px;
      color: #888;
      line-height: 1.4;
    }
    .bar-wrap {
      height: 6px;
      background: rgba(0,0,0,0.07);
      border-radius: 999px;
      overflow: hidden;
    }
    .bar-fill {
      height: 6px;
      border-radius: 999px;
      background: var(--sur);
      width: 0%;
      transition: width 1s cubic-bezier(.25,.8,.25,1);
    }
    .bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }
    .bar-labels .lsous { color: var(--sous); font-weight: 500; }
    .bar-labels .lsur { color: var(--sur); font-weight: 500; }
    .btn-next {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: #111;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: 2px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-next:active { opacity: 0.85; transform: scale(0.98); }

    /* EMPTY */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 100%;
      color: rgba(0,0,0,0.4);
      font-size: 14px;
      text-align: center;
      padding: 2rem;
    }
    .empty-state .big { font-size: 48px; }
    .empty-state.visible { display: flex; }
  </style>
</head>
<body>
<div class="app" id="app">

  <div class="header" id="header">
    <div class="logo">Surcôté</div>
    <div class="votes-badge">
      <div class="dot"></div>
      <span id="totalVotes">...</span> votes
    </div>
  </div>

  <div class="cats" id="cats">
    <div class="pill active" data-cat="Tout">Tout</div>
    <div class="pill" data-cat="Mode">Mode</div>
    <div class="pill" data-cat="Food">Food</div>
    <div class="pill" data-cat="Voyage">Voyage</div>
    <div class="pill" data-cat="Tech">Tech</div>
    <div class="pill" data-cat="Musique">Musique</div>
    <div class="pill" data-cat="Cinéma">Cinéma</div>
    <div class="pill" data-cat="Sport">Sport</div>
    <div class="pill" data-cat="Vie quotidienne">Quotidien</div>
    <div class="pill" data-cat="Beauté">Beauté</div>
  </div>

  <div class="card-zone" id="cardZone">
    <div class="axis-label top">↑ Surcôté</div>


    <div class="card back" id="cardBack">
      <div class="card-photo" id="backPhoto"></div>
      <div class="card-info">
        <div class="card-cat" id="backCat"></div>
        <div class="card-name" id="backName"></div>
      </div>
    </div>

    <div class="card front" id="cardFront">
      <div class="card-photo" id="frontPhoto">
        <div class="card-loading" id="cardLoading"><div class="spinner"></div></div>
        <div class="hint-over hint-sur">↑ Surcôté</div>
        <div class="hint-over hint-sous">↓ Sous-côté</div>
        <div class="photo-bottom-label">Sous-côté ↓</div>
      </div>
      <div class="card-info" id="frontInfo">
        <div class="card-cat" id="frontCat"></div>
        <div class="card-name" id="frontName"></div>
      </div>
    </div>

    <div class="empty-state" id="emptyState">
      <div class="big">🎉</div>
      <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:#111">C'est tout pour l'instant !</div>
      <div>Reviens plus tard pour de nouvelles cartes.</div>
    </div>


    <!-- Result panel inside card-zone so it overlays the card -->
    <div class="result-panel" id="resultPanel">
      <div class="result-handle"></div>
      <div>
        <div class="result-subject">Le verdict mondial sur</div>
        <div class="result-name" id="rName"></div>
      </div>
      <div class="verdict-row">
        <div class="verdict-pct" id="rPct"></div>
        <div class="result-verdict" id="rVerdict"></div>
      </div>
      <div>
        <div class="bar-wrap"><div class="bar-fill" id="rBar"></div></div>
        <div class="bar-labels">
          <span class="lsous" id="rSous"></span>
          <span class="lsur" id="rSur"></span>
        </div>
      </div>
      <button class="btn-next" id="btnNext">Carte suivante →</button>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://rgtwretpvwtkviqjxcfc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJndHdyZXRwdnd0a3ZpcWp4Y2ZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODE0OTgsImV4cCI6MjA4OTA1NzQ5OH0.4LUYXGMhQQ39Ie8ixtz5nP6vPCnyWaaEjoPgLyvH5TY';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const CAT_COLORS = {
  'Mode':            '#FF6EC7',
  'Food':            '#FFB347',
  'Voyage':          '#56D4E8',
  'Tech':            '#7B9FFF',
  'Vie quotidienne': '#7EE89A',
  'Musique':         '#C77DFF',
  'Cinéma':          '#FF7F7F',
  'Sport':           '#5BC8F5',
  'Beauté':          '#FFB3D9',
  'Tout':            '#F5F0E8',
};

let items = [], idx = 0, currentCat = 'Tout';
let dragging = false, startY = 0, curY = 0;

const front = document.getElementById('cardFront');
const zone  = document.getElementById('cardZone');
const panel = document.getElementById('resultPanel');
const loading = document.getElementById('cardLoading');
const app   = document.getElementById('app');
const header = document.getElementById('header');
const cats  = document.getElementById('cats');

function setCatBg(cat) {
  const color = CAT_COLORS[cat] || CAT_COLORS['Tout'];
  app.style.background    = color;
  header.style.background = color;
  cats.style.background   = color;
  document.querySelectorAll('.card-info').forEach(el => el.style.background = color);
}

function hdUrl(url) {
  if (!url) return null;
  if (url.includes('pexels.com')) {
    return url.replace(/[?&]w=\d+/g, '').replace(/[?&]q=\d+/g, '') + '?w=1200&q=95&auto=compress&cs=tinysrgb';
  }
  return url;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

async function loadItems(cat) {
  let q = db.from('items').select('*');
  if (cat !== 'Tout') q = q.eq('category', cat);
  const { data } = await q;
  return shuffle(data || []);
}

async function loadTotalVotes() {
  const { count } = await db.from('votes').select('*', { count: 'exact', head: true });
  document.getElementById('totalVotes').textContent = (count || 0).toLocaleString('fr-FR');
}

async function getVotesForItem(itemId) {
  const { data } = await db.from('votes').select('vote').eq('item_id', itemId);
  if (!data || data.length === 0) return { sur: 50, sous: 50, total: 0 };
  const total = data.length;
  const surCount = data.filter(v => v.vote === 'sur').length;
  return {
    sur: Math.round((surCount / total) * 100),
    sous: Math.round(((total - surCount) / total) * 100),
    total
  };
}

async function castVote(itemId, vote) {
  await db.from('votes').insert({ item_id: itemId, vote });
  loadTotalVotes();
}

function setCard(card, photoEl, nameEl, catEl) {
  if (!card) return;
  const existingImg = photoEl.querySelector('img');
  if (existingImg) existingImg.remove();
  const existingFb = photoEl.querySelector('.card-photo-fallback');
  if (existingFb) existingFb.remove();

  const url = hdUrl(card.image_url);
  if (url) {
    const img = document.createElement('img');
    img.src = url;
    img.alt = card.name;
    img.onerror = () => {
      img.remove();
      const fb = document.createElement('div');
      fb.className = 'card-photo-fallback';
      photoEl.appendChild(fb);
    };
    photoEl.appendChild(img);
  } else {
    const fb = document.createElement('div');
    fb.className = 'card-photo-fallback';
    photoEl.appendChild(fb);
  }
  nameEl.textContent = card.name;
  catEl.textContent = card.category;
}

function loadCards() {
  const c = items[idx];
  const n = items[idx + 1];
  if (!c) {
    front.style.display = 'none';
    document.getElementById('cardBack').style.display = 'none';
    document.getElementById('emptyState').classList.add('visible');
    return;
  }
  loading.style.display = 'none';
  setCatBg(c.category);
  setCard(c, document.getElementById('frontPhoto'), document.getElementById('frontName'), document.getElementById('frontCat'));
  if (n) setCard(n, document.getElementById('backPhoto'), document.getElementById('backName'), document.getElementById('backCat'));
}

async function showResult(vote) {
  const c = items[idx];
  await castVote(c.id, vote);
  const stats = await getVotesForItem(c.id);
  document.getElementById('rName').textContent = c.name;
  const isSur = stats.sur >= 50;
  const pct = isSur ? stats.sur : stats.sous;
  const rPct = document.getElementById('rPct');
  rPct.textContent = pct + '%';
  rPct.className = 'verdict-pct ' + (isSur ? 'sur' : 'sous');
  document.getElementById('rVerdict').textContent = `des gens pensent que c'est ${isSur ? 'surcôté' : 'sous-côté'} (${stats.total} vote${stats.total > 1 ? 's' : ''})`;
  document.getElementById('rSous').textContent = stats.sous + '% sous-côté';
  document.getElementById('rSur').textContent = stats.sur + '% surcôté';
  panel.style.display = 'flex';
  requestAnimationFrame(() => {
    panel.classList.add('visible');
    setTimeout(() => { document.getElementById('rBar').style.width = stats.sur + '%'; }, 100);
  });
}

function swipe(dir) {
  const vote = dir < 0 ? 'sous' : 'sur';
  front.style.transition = 'transform 0.4s cubic-bezier(.25,.8,.25,1), opacity 0.4s';
  front.style.transform = `translateY(${dir * -700}px) rotate(${dir * -3}deg)`;
  front.style.opacity = '0';
  front.classList.remove('show-sur', 'show-sous');
  zone.classList.remove('pulling-up', 'pulling-down');
  front.style.pointerEvents = 'none';
  showResult(vote);
}

document.getElementById('btnNext').onclick = () => {
  idx++;
  panel.classList.remove('visible');
  setTimeout(() => { panel.style.display = 'none'; }, 400);
  document.getElementById('rBar').style.width = '0%';
  front.style.transition = 'none';
  front.style.transform = '';
  front.style.opacity = '1';
  front.style.pointerEvents = '';
  loadCards();
};

function onStart(y) { dragging = true; startY = y; front.style.transition = 'none'; }
function onMove(y) {
  if (!dragging) return;
  curY = y - startY;
  front.style.transform = `translateY(${curY}px) rotate(${curY * 0.012}deg)`;
  front.classList.toggle('show-sur', curY < -70);
  front.classList.toggle('show-sous', curY > 70);
  zone.classList.toggle('pulling-up', curY < -70);
  zone.classList.toggle('pulling-down', curY > 70);
}
function onEnd() {
  if (!dragging) return; dragging = false;
  if (curY < -110) swipe(1);
  else if (curY > 110) swipe(-1);
  else {
    front.style.transition = 'transform 0.3s cubic-bezier(.25,.8,.25,1)';
    front.style.transform = '';
    front.classList.remove('show-sur', 'show-sous');
    zone.classList.remove('pulling-up', 'pulling-down');
  }
  curY = 0;
}

front.addEventListener('mousedown', e => onStart(e.clientY));
window.addEventListener('mousemove', e => { if (dragging) onMove(e.clientY); });
window.addEventListener('mouseup', onEnd);
front.addEventListener('touchstart', e => { e.preventDefault(); onStart(e.touches[0].clientY); }, { passive: false });
front.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0].clientY); }, { passive: false });
front.addEventListener('touchend', onEnd);

document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', async () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    currentCat = p.dataset.cat;
    idx = 0;
    panel.classList.remove('visible');
    panel.style.display = 'none';
    loading.style.display = 'flex';
    front.style.cssText = '';
    document.getElementById('emptyState').classList.remove('visible');
    front.style.display = '';
    document.getElementById('cardBack').style.display = '';
    setCatBg(currentCat);
    items = await loadItems(currentCat);
    loadCards();
  });
});

(async () => {
  loadTotalVotes();
  setCatBg('Tout');
  items = await loadItems('Tout');
  loadCards();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proposer – Surcôté</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      min-height: 100dvh;
      font-family: 'DM Sans', sans-serif;
      background-color: #FFD60A;
      transition: background-color 0.4s ease;
    }

    .page {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 1.25rem 1.25rem 3rem;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 3px solid #111;
    }

    .btn-back {
      font-family: 'Anton', Impact, sans-serif;
      font-size: 1rem;
      font-weight: 900;
      color: #111;
      background: transparent;
      border: 2px solid #111;
      padding: 0.3em 0.7em;
      text-decoration: none;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      transition: background 0.15s;
    }
    .btn-back:hover { background: rgba(0,0,0,0.08); }

    .page-title {
      font-family: 'Anton', Impact, sans-serif;
      font-size: clamp(1.5rem, 7vw, 2rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: #111;
      line-height: 1;
    }

    .form-group { margin-bottom: 1.5rem; }

    .form-label {
      display: block;
      font-family: 'Anton', Impact, sans-serif;
      font-size: 0.85rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #111;
      margin-bottom: 0.5rem;
    }
    .form-label .opt {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      opacity: 0.5;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: #111;
      background: transparent;
      border: 2px solid #111;
      padding: 0.65em 0.85em;
      outline: none;
      box-sizing: border-box;
      appearance: none;
      -webkit-appearance: none;
      border-radius: 0;
      transition: background 0.15s;
    }
    .form-input::placeholder,
    .form-textarea::placeholder { color: rgba(0,0,0,0.35); }
    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus { background: rgba(0,0,0,0.06); }

    .form-textarea { resize: vertical; min-height: 90px; line-height: 1.5; }

    .form-select-wrap { position: relative; }
    .form-select-wrap::after {
      content: '▼';
      position: absolute;
      right: 0.85em; top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 0.7rem;
      color: #111;
    }

    .char-count {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      color: rgba(0,0,0,0.4);
      text-align: right;
      margin-top: 0.3rem;
    }
    .char-count.warn { color: #D85A30; font-weight: 700; }

    .error-msg {
      background: #D85A30;
      color: white;
      font-family: 'Anton', Impact, sans-serif;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.6em 0.85em;
      border: 2px solid #111;
      margin-bottom: 0.75rem;
      display: none;
    }
    .error-msg.visible { display: block; }

    .btn-submit {
      width: 100%;
      font-family: 'Anton', Impact, sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #fff;
      background: #111;
      border: 3px solid #111;
      padding: 0.65em 1em;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 0.5rem;
    }
    .btn-submit:hover { opacity: 0.85; }
    .btn-submit:active { opacity: 0.7; }
    .btn-submit:disabled { opacity: 0.35; cursor: not-allowed; }

    .form-note {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      color: rgba(0,0,0,0.45);
      text-align: center;
      margin-top: 0.75rem;
    }

    .success-msg {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      text-align: center;
      padding: 3rem 1rem;
      flex: 1;
      justify-content: center;
    }
    .success-msg.visible { display: flex; }
    .success-emoji { font-size: 3.5rem; }
    .success-title {
      font-family: 'Anton', Impact, sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: #111;
      line-height: 1;
    }
    .success-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: rgba(0,0,0,0.6);
      line-height: 1.6;
    }
  </style>
</head>
<body>
<div class="page">

  <div class="header" id="pageHeader">
    <a href="index.html" class="btn-back">← Retour</a>
    <div class="page-title">Proposer</div>
  </div>

  <form id="formCard" onsubmit="event.preventDefault(); submitCard();">

    <div class="form-group">
      <label class="form-label" for="cardName">Nom de la carte *</label>
      <input class="form-input" id="cardName" type="text" maxlength="60"
        placeholder="ex : L'ananas sur la pizza, Les crocs en J…" autocomplete="off" />
      <div class="char-count" id="nameCount">0 / 60</div>
    </div>

    <div class="form-group">
      <label class="form-label" for="cardCat">Catégorie *</label>
      <div class="form-select-wrap">
        <select class="form-select" id="cardCat">
          <option value="">— Choisir —</option>
          <option value="Mode">Mode</option>
          <option value="Food">Food</option>
          <option value="Voyage">Voyage</option>
          <option value="Tech">Tech</option>
          <option value="Musique">Musique</option>
          <option value="Cinéma">Cinéma</option>
          <option value="Sport">Sport</option>
          <option value="Beauté">Beauté</option>
          <option value="Quotidien">Quotidien</option>
          <option value="Animaux">Animaux</option>
          <option value="Actions">Actions</option>
          <option value="Déco">Déco</option>
          <option value="Nature">Nature</option>
          <option value="Bien-être">Bien-être</option>
          <option value="Créativité">Créativité</option>
          <option value="Soirées">Soirées</option>
          <option value="Nostalgie">Nostalgie</option>
          <option value="Autre">Autre</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="cardJustif">
        Pourquoi c'est cool ? <span class="opt">(optionnel)</span>
      </label>
      <textarea class="form-textarea" id="cardJustif" maxlength="280"
        placeholder="Dis-nous pourquoi cette carte mérite d'être là…"></textarea>
      <div class="char-count" id="justifCount">0 / 280</div>
    </div>

    <div class="form-group">
      <label class="form-label" for="cardPseudo">
        Ton pseudo <span class="opt">(optionnel)</span>
      </label>
      <input class="form-input" id="cardPseudo" type="text" maxlength="30"
        placeholder="Anonyme si vide" autocomplete="nickname" />
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="btn-submit" id="btnSubmit" type="submit">Envoyer →</button>
    <p class="form-note">Les propositions sont relues avant publication.</p>

  </form>

  <div class="success-msg" id="successMsg">
    <div class="success-emoji">🎉</div>
    <div class="success-title">Merci !</div>
    <div class="success-sub">
      Ta proposition a bien été envoyée.<br/>
      Elle sera étudiée et peut-être ajoutée<br/>à la prochaine mise à jour.
    </div>
    <a href="index.html" class="btn-back" style="margin-top:1rem;font-size:1rem;padding:0.5em 1.2em;">
      ← Menu
    </a>
  </div>

</div>
<script>
  const SUPABASE_URL = 'https://rgtwretpvwtkviqjxcfc.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJndHdyZXRwdnd0a3ZpcWp4Y2ZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODE0OTgsImV4cCI6MjA4OTA1NzQ5OH0.4LUYXGMhQQ39Ie8ixtz5nP6vPCnyWaaEjoPgLyvH5TY';

  const CAT_COLORS = {
    'Mode':'#FF3B30','Food':'#FF9500','Voyage':'#FFCC00','Tech':'#007AFF',
    'Musique':'#5856D6','Cinéma':'#AF52DE','Sport':'#FF6B35','Beauté':'#FF2D55',
    'Quotidien':'#32ADE6','Animaux':'#30D158','Actions':'#6C6C70','Déco':'#64D2FF',
    'Nature':'#34C759','Bien-être':'#00C7BE','Créativité':'#FF375F',
    'Soirées':'#FFD60A','Nostalgie':'#FF453A','Autre':'#AAAAAA',
  };

  document.getElementById('cardCat').addEventListener('change', function() {
    document.body.style.backgroundColor = CAT_COLORS[this.value] || '#FFD60A';
  });

  document.getElementById('cardName').addEventListener('input', function() {
    const el = document.getElementById('nameCount');
    el.textContent = `${this.value.length} / 60`;
    el.className = 'char-count' + (this.value.length > 50 ? ' warn' : '');
  });

  document.getElementById('cardJustif').addEventListener('input', function() {
    const el = document.getElementById('justifCount');
    el.textContent = `${this.value.length} / 280`;
    el.className = 'char-count' + (this.value.length > 250 ? ' warn' : '');
  });

  async function submitCard() {
    const name   = document.getElementById('cardName').value.trim();
    const cat    = document.getElementById('cardCat').value;
    const justif = document.getElementById('cardJustif').value.trim();
    const pseudo = document.getElementById('cardPseudo').value.trim();
    const btn    = document.getElementById('btnSubmit');

    document.getElementById('errorMsg').className = 'error-msg';

    if (!name)           { showError('Le nom de la carte est obligatoire.'); return; }
    if (name.length < 2) { showError('Le nom est trop court.'); return; }
    if (!cat)            { showError('Choisis une catégorie.'); return; }

    btn.disabled = true;
    btn.textContent = 'Envoi…';

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/propositions`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({
          nom: name, categorie: cat,
          justification: justif || null,
          pseudo: pseudo || 'Anonyme',
          status: 'pending',
          created_at: new Date().toISOString()
        })
      });
      if (res.ok || res.status === 201) { showSuccess(); }
      else { saveLocal(name,cat,justif,pseudo); showSuccess(); }
    } catch(e) {
      saveLocal(name,cat,justif,pseudo); showSuccess();
    }
  }

  function saveLocal(name, cat, justif, pseudo) {
    const p = JSON.parse(localStorage.getItem('surcote_pending') || '[]');
    p.push({ nom:name, categorie:cat, justification:justif, pseudo:pseudo||'Anonyme', created_at:new Date().toISOString() });
    localStorage.setItem('surcote_pending', JSON.stringify(p));
  }

  function showSuccess() {
    document.getElementById('formCard').style.display = 'none';
    document.getElementById('pageHeader').style.display = 'none';
    document.getElementById('successMsg').classList.add('visible');
    document.body.style.backgroundColor = '#34C759';
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.className = 'error-msg visible';
    document.getElementById('btnSubmit').disabled = false;
    document.getElementById('btnSubmit').textContent = 'Envoyer →';
  }
</script>
</body>
</html>

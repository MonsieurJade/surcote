<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proposer une carte – Surcôté</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body.proposer-page {
      min-height: 100dvh;
      background-color: #FFD60A;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1.25rem 3rem;
    }

    .page-header {
      width: 100%;
      max-width: 520px;
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .btn-back {
      font-family: 'Black Han Sans', 'Anton', Impact, sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      color: #111;
      background: white;
      border: 3px solid #111;
      padding: 0.3em 0.6em;
      box-shadow: 4px 4px 0 #111;
      text-decoration: none;
      line-height: 1;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-back:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #111; }
    .btn-back:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #111; }

    .page-title {
      font-family: 'Black Han Sans', 'Anton', Impact, sans-serif;
      font-size: clamp(1.6rem, 7vw, 2.4rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      color: #111;
      line-height: 1;
    }

    /* ─ CARTE PREVIEW ─ */
    .card-preview-wrap {
      width: 100%;
      max-width: 340px;
      margin-bottom: 2rem;
    }

    .card-preview {
      background: white;
      border: 4px solid #111;
      box-shadow: 8px 8px 0 #111;
      border-radius: 16px;
      aspect-ratio: 3/4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      overflow: hidden;
      position: relative;
      padding: 1.2rem 1rem;
    }

    .card-preview-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .card-preview-img.visible { display: block; }

    .card-preview-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%);
      display: none;
    }
    .card-preview-overlay.visible { display: block; }

    .card-preview-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      opacity: 0.3;
      flex: 1;
    }
    .card-preview-placeholder svg { width: 56px; height: 56px; }
    .card-preview-placeholder span {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .card-preview-label {
      position: relative;
      z-index: 2;
      background: white;
      border: 3px solid #111;
      padding: 0.4em 0.8em;
      font-family: 'Black Han Sans', 'Anton', Impact, sans-serif;
      font-size: 1.2rem;
      font-weight: 900;
      text-transform: uppercase;
      color: #111;
      text-align: center;
      max-width: 90%;
      word-break: break-word;
      line-height: 1.1;
    }

    .card-preview-cat {
      position: absolute;
      top: 1rem;
      left: 1rem;
      z-index: 2;
      background: #FFD60A;
      border: 2px solid #111;
      padding: 0.2em 0.6em;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #111;
    }

    /* ─ FORM ─ */
    .form-card {
      width: 100%;
      max-width: 520px;
      background: white;
      border: 4px solid #111;
      box-shadow: 8px 8px 0 #111;
      padding: 1.5rem 1.25rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-family: 'Black Han Sans', 'Anton', Impact, sans-serif;
      font-size: 0.9rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #111;
      margin-bottom: 0.4rem;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: #111;
      background: #f5f5f5;
      border: 3px solid #111;
      padding: 0.6em 0.8em;
      outline: none;
      box-sizing: border-box;
      appearance: none;
      border-radius: 0;
      transition: background 0.15s;
    }
    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      background: #FFD60A;
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-select-wrap {
      position: relative;
    }
    .form-select-wrap::after {
      content: '▼';
      position: absolute;
      right: 0.8em;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 0.75rem;
      color: #111;
    }

    .form-hint {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: #555;
      margin-top: 0.3rem;
      letter-spacing: 0.03em;
    }

    /* char counter */
    .char-count {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: #888;
      text-align: right;
      margin-top: 0.25rem;
    }
    .char-count.warn { color: #FF3B30; font-weight: 700; }

    /* ─ SUBMIT ─ */
    .btn-submit {
      width: 100%;
      font-family: 'Black Han Sans', 'Anton', Impact, sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #111;
      background: #FFD60A;
      border: 4px solid #111;
      padding: 0.65em 1em;
      box-shadow: 6px 6px 0 #111;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      margin-top: 0.5rem;
    }
    .btn-submit:hover { transform: translate(-3px,-3px); box-shadow: 9px 9px 0 #111; }
    .btn-submit:active { transform: translate(3px,3px); box-shadow: 3px 3px 0 #111; }
    .btn-submit:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: 6px 6px 0 #111;
    }

    /* ─ SUCCESS STATE ─ */
    .success-msg {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      text-align: center;
      padding: 2rem 1rem;
    }
    .success-msg.visible { display: flex; }

    .success-emoji {
      font-size: 4rem;
      animation: bounce 0.5s ease;
    }
    @keyframes bounce {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    .success-title {
      font-family: 'Black Han Sans', 'Anton', Impact, sans-serif;
      font-size: 2rem;
      font-weight: 900;
      text-transform: uppercase;
      color: #111;
    }
    .success-sub {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: #333;
      line-height: 1.6;
    }

    /* ─ ERROR ─ */
    .error-msg {
      background: #FF3B30;
      color: white;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.6em 0.8em;
      border: 2px solid #111;
      margin-top: 0.5rem;
      display: none;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body class="proposer-page">

  <div class="page-header">
    <a href="index.html" class="btn-back">←</a>
    <div class="page-title">✚ Proposer une carte</div>
  </div>

  <!-- Live preview -->
  <div class="card-preview-wrap">
    <div class="card-preview" id="cardPreview">
      <div class="card-preview-placeholder" id="previewPlaceholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <span>Aperçu de la carte</span>
      </div>
      <img class="card-preview-img" id="previewImg" alt="" />
      <div class="card-preview-overlay" id="previewOverlay"></div>
      <div class="card-preview-cat" id="previewCat" style="display:none"></div>
      <div class="card-preview-label" id="previewLabel" style="display:none"></div>
    </div>
  </div>

  <!-- Form -->
  <div class="form-card" id="formCard">
    <!-- Nom de la carte -->
    <div class="form-group">
      <label class="form-label" for="cardName">Nom de la carte *</label>
      <input
        class="form-input"
        id="cardName"
        type="text"
        maxlength="60"
        placeholder="ex : Les crocs en J, L'ananas sur la pizza…"
        autocomplete="off"
      />
      <div class="char-count" id="nameCount">0 / 60</div>
    </div>

    <!-- Catégorie -->
    <div class="form-group">
      <label class="form-label" for="cardCat">Catégorie *</label>
      <div class="form-select-wrap">
        <select class="form-select" id="cardCat">
          <option value="">— Choisir —</option>
          <option value="Mode">Mode</option>
          <option value="Food">Food</option>
          <option value="Voyage">Voyage</option>
          <option value="Tech">Tech</option>
          <option value="Musique">Musique</option>
          <option value="Cinéma">Cinéma</option>
          <option value="Sport">Sport</option>
          <option value="Beauté">Beauté</option>
          <option value="Quotidien">Quotidien</option>
          <option value="Animaux">Animaux</option>
          <option value="Actions">Actions</option>
          <option value="Déco">Déco</option>
          <option value="Nature">Nature</option>
          <option value="Bien-être">Bien-être</option>
          <option value="Créativité">Créativité</option>
          <option value="Soirées">Soirées</option>
          <option value="Nostalgie">Nostalgie</option>
          <option value="Autre">Autre</option>
        </select>
      </div>
    </div>

    <!-- Justification optionnelle -->
    <div class="form-group">
      <label class="form-label" for="cardJustif">Pourquoi tu penses ça ? <span style="font-size:0.75em;opacity:0.5">(optionnel)</span></label>
      <textarea
        class="form-textarea"
        id="cardJustif"
        maxlength="280"
        placeholder="Donne ton avis en quelques mots…"
      ></textarea>
      <div class="char-count" id="justifCount">0 / 280</div>
    </div>

    <!-- Pseudo -->
    <div class="form-group">
      <label class="form-label" for="cardPseudo">Ton pseudo <span style="font-size:0.75em;opacity:0.5">(optionnel)</span></label>
      <input
        class="form-input"
        id="cardPseudo"
        type="text"
        maxlength="30"
        placeholder="Anonyme si vide"
        autocomplete="nickname"
      />
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="btn-submit" id="btnSubmit" onclick="submitCard()">
      Envoyer ✦
    </button>
    <p class="form-hint" style="text-align:center;margin-top:0.8rem">
      Les propositions sont relues avant publication.
    </p>
  </div>

  <!-- Success state -->
  <div class="success-msg" id="successMsg">
    <div class="success-emoji">🎉</div>
    <div class="success-title">Merci !</div>
    <div class="success-sub">
      Ta proposition a bien été envoyée.<br/>
      Elle sera étudiée et peut-être ajoutée<br/>à la prochaine mise à jour.
    </div>
    <a href="index.html" class="btn-back" style="font-size:1rem;padding:0.5em 1.2em;box-shadow:4px 4px 0 #111">← Retour au menu</a>
  </div>

  <script>
    // ── Supabase ──
    const SUPABASE_URL = 'https://rgtwretpvwtkviqjxcfc.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJndHdyZXRwdnd0a3ZpcWp4Y2ZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODE0OTgsImV4cCI6MjA4OTA1NzQ5OH0.4LUYXGMhQQ39Ie8ixtz5nP6vPCnyWaaEjoPgLyvH5TY';

    const CAT_COLORS = {
      'Mode': '#FF3B30', 'Food': '#FF9500', 'Voyage': '#FFCC00',
      'Tech': '#007AFF', 'Musique': '#5856D6', 'Cinéma': '#AF52DE',
      'Sport': '#FF6B35', 'Beauté': '#FF2D55', 'Quotidien': '#32ADE6',
      'Animaux': '#30D158', 'Actions': '#6C6C70', 'Déco': '#64D2FF',
      'Nature': '#34C759', 'Bien-être': '#00C7BE', 'Créativité': '#FF375F',
      'Soirées': '#FFD60A', 'Nostalgie': '#FF453A', 'Autre': '#CCCCCC',
    };

    // Live preview
    const nameEl = document.getElementById('cardName');
    const catEl = document.getElementById('cardCat');
    const previewLabel = document.getElementById('previewLabel');
    const previewCat = document.getElementById('previewCat');
    const previewPlaceholder = document.getElementById('previewPlaceholder');
    const nameCount = document.getElementById('nameCount');
    const justifCount = document.getElementById('justifCount');

    nameEl.addEventListener('input', () => {
      const v = nameEl.value.trim();
      nameCount.textContent = `${nameEl.value.length} / 60`;
      nameCount.className = 'char-count' + (nameEl.value.length > 50 ? ' warn' : '');
      if (v) {
        previewLabel.textContent = v.toUpperCase();
        previewLabel.style.display = '';
        previewPlaceholder.style.display = 'none';
      } else {
        previewLabel.style.display = 'none';
        if (!catEl.value) previewPlaceholder.style.display = '';
      }
    });

    catEl.addEventListener('change', () => {
      const v = catEl.value;
      if (v) {
        previewCat.textContent = v.toUpperCase();
        previewCat.style.display = '';
        previewCat.style.background = CAT_COLORS[v] || '#FFD60A';
        previewPlaceholder.style.display = 'none';
        document.body.style.backgroundColor = CAT_COLORS[v] || '#FFD60A';
      } else {
        previewCat.style.display = 'none';
      }
    });

    document.getElementById('cardJustif').addEventListener('input', function() {
      justifCount.textContent = `${this.value.length} / 280`;
      justifCount.className = 'char-count' + (this.value.length > 250 ? ' warn' : '');
    });

    // Submit
    async function submitCard() {
      const name = nameEl.value.trim();
      const cat = catEl.value;
      const justif = document.getElementById('cardJustif').value.trim();
      const pseudo = document.getElementById('cardPseudo').value.trim();
      const errEl = document.getElementById('errorMsg');
      const btn = document.getElementById('btnSubmit');

      errEl.className = 'error-msg';

      if (!name) { showError('Le nom de la carte est obligatoire.'); return; }
      if (!cat) { showError('Choisis une catégorie.'); return; }
      if (name.length < 2) { showError('Le nom est trop court.'); return; }

      btn.disabled = true;
      btn.textContent = 'Envoi en cours…';

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/propositions`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({
            nom: name,
            categorie: cat,
            justification: justif || null,
            pseudo: pseudo || 'Anonyme',
            status: 'pending',
            created_at: new Date().toISOString()
          })
        });

        if (res.ok || res.status === 201) {
          document.getElementById('formCard').style.display = 'none';
          document.querySelector('.card-preview-wrap').style.display = 'none';
          document.querySelector('.page-header').style.display = 'none';
          document.getElementById('successMsg').classList.add('visible');
          document.body.style.backgroundColor = '#34C759';
        } else {
          const body = await res.text();
          // Si la table n'existe pas encore, on simule le succès (dev mode)
          if (res.status === 404 || res.status === 400) {
            simulateSuccess();
          } else {
            showError(`Erreur serveur (${res.status}). Réessaie plus tard.`);
            btn.disabled = false;
            btn.textContent = 'Envoyer ✦';
          }
        }
      } catch (e) {
        // Offline fallback : on sauvegarde localement
        const pending = JSON.parse(localStorage.getItem('surcote_pending') || '[]');
        pending.push({ nom: name, categorie: cat, justification: justif, pseudo: pseudo || 'Anonyme', created_at: new Date().toISOString() });
        localStorage.setItem('surcote_pending', JSON.stringify(pending));
        simulateSuccess();
      }
    }

    function simulateSuccess() {
      document.getElementById('formCard').style.display = 'none';
      document.querySelector('.card-preview-wrap').style.display = 'none';
      document.querySelector('.page-header').style.display = 'none';
      document.getElementById('successMsg').classList.add('visible');
      document.body.style.backgroundColor = '#34C759';
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.className = 'error-msg visible';
    }
  </script>
</body>
</html>
